<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q Zone Coffee & Tea – Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a0e0a;
    --surface: #221410;
    --surface2: #2e1a10;
    --gold: #c9a96e;
    --gold-light: #e8cc99;
    --gold-dim: #7a6040;
    --text: #f5ede0;
    --text-muted: #a89070;
    --divider: rgba(201,169,110,0.25);
    --accent: #8b1a1a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Be Vietnam Pro', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* HEADER */
  .hero {
    text-align: center;
    padding: 48px 24px 32px;
    background: radial-gradient(ellipse at top, #2e1a10 0%, #1a0e0a 70%);
    border-bottom: 1px solid var(--divider);
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c9a96e' fill-opacity='0.03'%3E%3Ccircle cx='20' cy='20' r='1.5'/%3E%3C/g%3E%3C/svg%3E");
  }
  .brand {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 8px;
  }
  .brand-q {
    font-family: 'Playfair Display', serif;
    font-size: 72px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
    letter-spacing: -2px;
    text-shadow: 0 0 40px rgba(201,169,110,0.3);
  }
  .brand-text {
    text-align: left;
  }
  .brand-zone {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 8px;
    line-height: 1;
  }
  .brand-sub {
    font-size: 12px;
    letter-spacing: 4px;
    color: var(--text-muted);
    text-transform: lowercase;
    margin-top: 4px;
  }
  .hero-tagline {
    color: var(--text-muted);
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 16px;
  }
  .gold-line {
    width: 80px;
    height: 1px;
    background: var(--gold-dim);
    margin: 16px auto;
  }

  /* NAV TABS */
  .nav-wrap {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--divider);
    padding: 0 16px;
    overflow-x: auto;
    white-space: nowrap;
    scrollbar-width: none;
  }
  .nav-wrap::-webkit-scrollbar { display: none; }
  .nav-tabs {
    display: inline-flex;
    gap: 0;
    min-width: 100%;
    justify-content: center;
  }
  .nav-tab {
    padding: 14px 18px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    white-space: nowrap;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }
  .nav-tab:hover { color: var(--gold-light); }
  .nav-tab.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  /* SECTIONS */
  .menu-section {
    display: none;
    max-width: 680px;
    margin: 0 auto;
    padding: 32px 20px;
  }
  .menu-section.active { display: block; }

  .section-header {
    text-align: center;
    margin-bottom: 28px;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 2px;
  }
  /* SECTION BANNER */
  .section-banner {
    width: 100%;
    height: 140px;
    border-radius: 12px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    border: 1px solid var(--divider);
    position: relative;
    overflow: hidden;
  }
  .section-banner::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.18);
    border-radius: 12px;
  }
  .section-banner span {
    position: relative;
    z-index: 1;
    font-size: 52px;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
  }
  .banner-ca-phe   { background: linear-gradient(135deg, #2c1a0e 0%, #5c3317 50%, #3b1f0c 100%); }
  .banner-tra      { background: linear-gradient(135deg, #0d2e1a 0%, #1a5c35 50%, #0a3320 100%); }
  .banner-tra-sua  { background: linear-gradient(135deg, #1a1030 0%, #3d2060 50%, #251545 100%); }
  .banner-sua-peo  { background: linear-gradient(135deg, #2e0d2e 0%, #5c1a5c 40%, #3b1040 100%); }
  .banner-sua-chua { background: linear-gradient(135deg, #2e1020 0%, #8b1a3a 50%, #3d0f20 100%); }
  .banner-nuoc     { background: linear-gradient(135deg, #0d2030 0%, #1a5070 50%, #0a2535 100%); }
  .banner-topping  { background: linear-gradient(135deg, #2a1f0a 0%, #6b4f1a 50%, #3a2a08 100%); }

  /* ITEM LIST */
  .item-list { display: flex; flex-direction: column; gap: 0; }
  .item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid var(--divider);
    gap: 12px;
  }
  .item:last-child { border-bottom: none; }
  .item-name {
    font-size: 15px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.4;
    flex: 1;
  }
  .item-topping {
    font-size: 11px;
    color: var(--gold-dim);
    font-weight: 400;
    margin-top: 4px;
    letter-spacing: 0.2px;
  }
  .item-topping span {
    color: var(--gold);
    font-weight: 500;
  }
  .item-desc {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 300;
    margin-top: 3px;
    line-height: 1.4;
  }
  .item-name-wrap {
    display: flex;
    flex-direction: column;
    flex: 1;
  }
  .item-name-row {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
  }
  .item-badge {
    font-size: 10px;
    background: var(--accent);
    color: #ffd4d4;
    padding: 2px 7px;
    border-radius: 20px;
    margin-left: 8px;
    vertical-align: middle;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .item-price {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--gold);
    white-space: nowrap;
    min-width: 48px;
    text-align: right;
  }

  /* CARD GROUPS */
  .card-group {
    background: var(--surface2);
    border: 1px solid var(--divider);
    border-radius: 12px;
    padding: 20px 20px 4px;
    margin-bottom: 20px;
  }
  .card-group-title {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  /* DUNG THEM GRID */
  .addons-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .addon-item {
    background: var(--surface2);
    border: 1px solid var(--divider);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .addon-name { font-size: 14px; color: var(--text); }
  .addon-price { font-size: 14px; color: var(--gold); font-family: 'Playfair Display', serif; }

  /* FOOTER */
  .footer {
    text-align: center;
    padding: 32px 20px 20px;
    border-top: 1px solid var(--divider);
    max-width: 680px;
    margin: 0 auto;
  }
  .footer-links {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .footer-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .footer-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold-dim);
  }
  .footer-value {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 400;
  }
  .footer-copy {
    font-size: 11px;
    color: var(--gold-dim);
    margin-top: 12px;
    letter-spacing: 1px;
  }
  .footer-map-btn {
    display: inline-block;
    margin-top: 6px;
    background: var(--surface2);
    border: 1px solid var(--divider);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--gold);
    font-weight: 500;
    text-decoration: none;
  }

  /* SEARCH */
  .search-wrap {
    max-width: 680px;
    margin: 0 auto;
    padding: 16px 20px 4px;
  }
  .search-box {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--divider);
    border-radius: 40px;
    padding: 10px 42px 10px 18px;
    color: var(--text);
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 14px;
    font-weight: 300;
    outline: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
  }
  .search-box::placeholder { color: var(--text-muted); }
  .search-box:focus { border-color: var(--gold-dim); }
  .search-box:disabled { opacity: 0.6; }

  .search-inner { position: relative; }
  .search-clear {
    position: absolute;
    right: 34px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
    display: none;
  }
  /* SEARCH RESULTS */
  #search-results {
    display: none;
    max-width: 680px;
    margin: 0 auto;
    padding: 12px 20px;
  }
  .search-result-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .search-empty {
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
    padding: 32px 0;
  }
  .addon-item mark {
    background: none;
    color: var(--gold);
    font-weight: 500;
  }
  .item mark {
    background: none;
    color: var(--gold);
    font-weight: 500;
  }

  /* MENU STATUS (loading / error) */
  .menu-status {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 64px 20px;
    max-width: 680px;
    margin: 0 auto;
  }
  .menu-status.hidden { display: none; }
  .menu-status-spinner {
    width: 36px;
    height: 36px;
    border: 4px solid var(--divider);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .menu-status-text { font-size: 14px; color: var(--text-muted); text-align: center; }
  .menu-status-retry-btn {
    background: var(--gold);
    color: #1a0e0a;
    border: none;
    border-radius: 20px;
    padding: 10px 24px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Be Vietnam Pro', sans-serif;
  }

  /* CART BUTTON */
  .cart-btn {
    position: fixed;
    bottom: 24px;
    right: 20px;
    z-index: 200;
    background: var(--gold);
    color: #1a0e0a;
    border: none;
    border-radius: 50px;
    padding: 14px 20px;
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 20px rgba(201,169,110,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .cart-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(201,169,110,0.5); }
  .cart-btn.hidden { display: none; }
  .cart-count {
    background: #8b1a1a;
    color: #fff;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }

  /* ADD BTN on items */
  .item-add {
    background: none;
    border: 1px solid var(--gold-dim);
    border-radius: 50%;
    width: 28px;
    height: 28px;
    color: var(--gold);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
    line-height: 1;
  }
  .item-add:hover { background: var(--gold); color: #1a0e0a; border-color: var(--gold); }
  .item.sold-out { opacity: 0.5; }
  .item.sold-out .item-add { display: none; }
  .addon-add {
    background: none;
    border: 1px solid var(--gold-dim);
    border-radius: 50%;
    width: 24px;
    height: 24px;
    color: var(--gold);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
    line-height: 1;
  }
  .addon-add:hover { background: var(--gold); color: #1a0e0a; border-color: var(--gold); }

  /* CART OVERLAY */
  .cart-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 300;
    backdrop-filter: blur(2px);
  }
  .cart-overlay.open { display: block; }
  .cart-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    max-height: 80vh;
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    border-top: 1px solid var(--divider);
    z-index: 400;
    display: flex;
    flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.3s ease;
  }
  .cart-panel.open { transform: translateY(0); }
  .cart-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--divider);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .cart-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--gold);
  }
  .cart-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 24px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
  }
  .cart-body {
    overflow-y: auto;
    flex: 1;
    padding: 12px 20px;
  }
  .cart-empty {
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
    padding: 40px 0;
  }
  .cart-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--divider);
  }
  .cart-item:last-child { border-bottom: none; }
  .cart-item-name {
    flex: 1;
    font-size: 14px;
    color: var(--text);
  }
  .cart-item-price {
    font-size: 14px;
    color: var(--gold);
    font-family: 'Playfair Display', serif;
    min-width: 52px;
    text-align: right;
  }
  .qty-control {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .qty-btn {
    background: var(--surface2);
    border: 1px solid var(--divider);
    border-radius: 50%;
    width: 26px;
    height: 26px;
    color: var(--gold);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .qty-btn:hover { border-color: var(--gold); }
  .qty-num {
    font-size: 14px;
    color: var(--text);
    min-width: 16px;
    text-align: center;
  }
  .cart-footer {
    padding: 16px 20px 28px;
    border-top: 1px solid var(--divider);
    flex-shrink: 0;
  }
  .cart-total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .cart-total-label {
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .cart-total-amount {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    color: var(--gold);
  }
  .cart-call-btn {
    width: 100%;
    background: var(--gold);
    color: #1a0e0a;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.5px;
  }
  .cart-call-btn:hover { background: var(--gold-light); }
  .cart-call-btn:disabled {
    background: var(--surface2);
    color: var(--text-muted);
    cursor: not-allowed;
  }
  .cart-call-btn:disabled:hover { background: var(--surface2); }
  .cart-clear {
    width: 100%;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    margin-top: 10px;
    padding: 4px;
    font-family: 'Be Vietnam Pro', sans-serif;
  }
  .cart-clear:hover { color: var(--text); }

  /* Flash animation */
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }
  .pop { animation: pop 0.2s ease; }

  /* BILL VIEW */
  .bill-view {
    display: none;
    position: fixed;
    inset: 0;
    background: #0d0d0d;
    z-index: 500;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 32px;
    cursor: pointer;
  }
  .bill-view.open { display: flex; }
  .bill-divider {
    width: 100%;
    max-width: 320px;
    border: none;
    border-top: 1px dashed #444;
    margin: 20px 0;
  }
  .bill-brand {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 6px;
    text-align: center;
  }
  .bill-table-row {
    width: 100%;
    max-width: 320px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin: 4px 0 0;
  }
  .bill-table-label {
    font-size: 15px;
    color: #888;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .bill-table-input {
    background: none;
    border: none;
    border-bottom: 1px solid #555;
    color: #fff;
    font-size: 18px;
    font-family: 'Be Vietnam Pro', sans-serif;
    font-weight: 600;
    width: 80px;
    text-align: center;
    outline: none;
    padding: 2px 4px;
  }
  .bill-table-input::placeholder { color: #444; }
  .bill-table-input::-webkit-outer-spin-button,
  .bill-table-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .bill-table-input[type="number"] { -moz-appearance: textfield; }
  .bill-items {
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .bill-item-row {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .bill-item-qty {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    min-width: 32px;
    text-align: right;
    font-family: 'Playfair Display', serif;
  }
  .bill-item-name {
    font-size: 20px;
    color: #fff;
    font-weight: 300;
    line-height: 1.3;
  }
  .bill-hint {
    font-size: 12px;
    color: #444;
    letter-spacing: 2px;
    text-align: center;
    margin-top: 8px;
  }

  /* ITEM NOTE */
  .cart-item-note {
    width: 100%;
    background: none;
    border: none;
    border-bottom: 1px solid var(--divider);
    color: var(--text-muted);
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 12px;
    font-weight: 300;
    padding: 4px 0;
    outline: none;
    margin-top: 4px;
    transition: border-color 0.2s;
  }
  .cart-item-note::placeholder { color: #4a3828; }
  .cart-item-note:focus { border-color: var(--gold-dim); color: var(--text); }
  .cart-item-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  /* BILL NOTE */
  .bill-item-note {
    font-size: 14px;
    color: #888;
    font-style: italic;
    margin-left: 44px;
    margin-top: -8px;
  }

  /* ORDER TYPE MODAL */
  .order-type-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 600;
  }
  .order-type-overlay.open { display: block; }

<body>

<div class="hero">
  <div class="brand">
    <div class="brand-q">Q</div>
    <div class="brand-text">
      <div class="brand-zone">ZONE</div>
      <div class="brand-sub">coffee &amp; tea</div>
    </div>
  </div>
  <div class="gold-line"></div>
  <div class="hero-tagline">Thực đơn · Menu</div>
</div>

<nav class="nav-wrap">

</nav>

<!-- LOADING / ERROR STATE -->
<div id="menu-status" class="menu-status">
  <div class="menu-status-spinner"></div>
  <div class="menu-status-text">Đang tải menu...</div>
</div>

<div class="search-wrap">
  <div class="search-inner">
    <input class="search-box" id="search-input" type="search" placeholder="Đang tải menu..." autocomplete="off" disabled>
    <button class="search-clear" id="search-clear" onclick="clearSearch()">×</button>
  </div>
</div>
<div id="search-results"></div>

<footer class="footer">
  <div class="gold-line"></div>
  <div class="footer-links" id="footer-links"></div>
  <div class="footer-copy" id="footer-copy">Q Zone Coffee & Tea</div>
</footer>

<script>
function showSection(id) {
  // Only clear search if actively searching
  if (document.getElementById('search-input').value.trim()) clearSearch();
  document.querySelectorAll('.menu-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const btn = document.querySelector(".nav-tab[onclick=\"showSection('" + id + "')\"]");
  if (btn) { btn.classList.add('active'); btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' }); }
}

function clearSearch() {
  const input = document.getElementById('search-input');
  input.value = '';
  document.getElementById('search-clear').style.display = 'none';
  document.getElementById('search-results').style.display = 'none';
  // innerHTML restore is safe — onclick is baked into the HTML, no re-attach needed
  document.querySelectorAll('.menu-section').forEach(s => {
    s.style.display = '';
    s.querySelectorAll('.item').forEach(i => {
      i.style.display = '';
      if (i.dataset.orig) i.innerHTML = i.dataset.orig;
    });
  });
  const activeTab = document.querySelector('.nav-tab.active');
  if (activeTab) {
    const id = activeTab.getAttribute('onclick').match(/'([^']+)'/)[1];
    document.getElementById(id).classList.add('active');
  } else {
    // Fallback: tab đầu tiên hiện có, không phụ thuộc ID cố định (menu được tải động từ Sheet)
    const firstTab = document.querySelector('.nav-tab');
    if (firstTab) {
      const id = firstTab.getAttribute('onclick').match(/'([^']+)'/)[1];
      const firstSection = document.getElementById(id);
      if (firstSection) firstSection.classList.add('active');
    }
  }
}

function removeAccents(str) {
  return str.normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/đ/g, 'd').replace(/Đ/g, 'D').toLowerCase();
}

document.getElementById('search-input').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  const clearBtn = document.getElementById('search-clear');
  const resultsDiv = document.getElementById('search-results');

  if (!q) { clearSearch(); return; }
  clearBtn.style.display = 'block';

  // Hide all sections, show results div
  document.querySelectorAll('.menu-section').forEach(s => s.style.display = 'none');
  resultsDiv.style.display = 'block';

  // Collect all items — use dataset.orig (full HTML, includes + button) for matching
  const allItems = document.querySelectorAll('.menu-section .item');
  const matches = [];
  const qNoAccent = removeAccents(q);
  allItems.forEach(item => {
    const text = item.dataset.orig;
    const plain = text.replace(/<[^>]+>/g, '').toLowerCase();
    const plainNoAccent = removeAccents(plain);
    if (plain.includes(q) || plainNoAccent.includes(qNoAccent)) matches.push({ item, text, plain });
  });

  if (matches.length === 0) {
    resultsDiv.innerHTML = '<div class="search-empty">Không tìm thấy món "<strong>' + this.value + '</strong>"</div>';
    return;
  }

  // Safe highlight: works for both accented and non-accented queries
  const qNoAccentH = removeAccents(q);

  // Build a map from noAccent string position → original string position
  function buildPosMap(original) {
    const origChars = [...original]; // NFC codepoints
    const map = [];
    for (let i = 0; i < origChars.length; i++) {
      const na = removeAccents(origChars[i]);
      for (let j = 0; j < na.length; j++) map.push(i);
    }
    map.push(origChars.length); // sentinel for end
    return map;
  }

  function highlightText(html) {
    return html.replace(/(<[^>]+>)|([^<]+)/g, (match, tag, text) => {
      if (tag) return tag;
      if (!text) return '';
      const textNA = removeAccents(text);
      const posMap = buildPosMap(text);
      let result = '';
      let i = 0; // position in textNA
      while (i < textNA.length) {
        const idx = textNA.indexOf(qNoAccentH, i);
        if (idx === -1) { result += text.slice(posMap[i]); break; }
        // Map noAccent positions back to original string positions
        const origStart = posMap[idx];
        const origEnd = posMap[idx + qNoAccentH.length];
        result += text.slice(posMap[i], origStart) + '<mark>' + text.slice(origStart, origEnd) + '</mark>';
        i = idx + qNoAccentH.length;
      }
      return result;
    });
  }

  let html = '<div class="search-result-label">' + matches.length + ' kết quả cho "' + this.value + '"</div><div class="item-list">';
  matches.forEach(({ item, text }) => {
    const highlighted = highlightText(text);
    // Giữ nguyên class gốc (gồm "sold-out" nếu món hết hàng) để ẩn đúng nút thêm vào giỏ
    html += '<div class="' + item.className + '">' + highlighted + '</div>';
  });
  html += '</div>';
  resultsDiv.innerHTML = html;
});

// ── CART ──────────────────────────────────────────────
const cart = {}; // { "Tên món|giá": { name, price, qty } }

function addToCart(name, priceStr, triggerBtn) {
  // Chặn ở tầng logic, không chỉ dựa vào CSS ẩn nút
  if (triggerBtn) {
    const itemEl = triggerBtn.closest('.item');
    if (itemEl && itemEl.classList.contains('sold-out')) return;
  }

  const price = Math.round(parseFloat(priceStr.replace('k','')) * 1000);
  const key = name + '|' + price;
  if (cart[key]) { cart[key].qty++; }
  else { cart[key] = { name, price, qty: 1 }; }
  updateCartUI();

  // Haptic feedback
  if (navigator.vibrate) navigator.vibrate(30);

  // Animate cart button
  const btn = document.getElementById('cart-btn');
  btn.classList.remove('pop');
  void btn.offsetWidth;
  btn.classList.add('pop');
}

function renderCartBody() {
  const items = Object.values(cart).filter(i => i.qty > 0);
  const body = document.getElementById('cart-body');
  if (items.length === 0) {
    body.innerHTML = '<div class="cart-empty">Chưa có món nào 🍃</div>';
    return;
  }
  // Only re-render if item keys changed (added/removed), not on qty change
  const newKeys = items.map(i => i.name + '|' + i.price).join(',');
  if (body.dataset.keys === newKeys) {
    // Just update qty numbers and subtotals in place
    items.forEach(item => {
      const key = item.name + '|' + item.price;
      const el = body.querySelector(`[data-key="${CSS.escape(key)}"]`);
      if (!el) return;
      el.querySelector('.qty-num').textContent = item.qty;
      el.querySelector('.cart-item-price').textContent = ((item.price * item.qty)/1000).toFixed(0) + 'k';
    });
    return;
  }
  body.dataset.keys = newKeys;
  body.innerHTML = items.map(item => {
    const key = item.name + '|' + item.price;
    const subtotal = ((item.price * item.qty)/1000).toFixed(0) + 'k';
    return `<div class="cart-item" style="flex-wrap:wrap;" data-key="${key}">
      <div class="cart-item-wrap">
        <div class="cart-item-name">${item.name}</div>
        <input class="cart-item-note" type="text" placeholder="Ghi chú... (ít đường, ít đá...)" value="${item.note || ''}" oninput="updateNote('${key}', this.value)">
      </div>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty('${key}', -1)">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty('${key}', 1)">+</button>
      </div>
      <div class="cart-item-price">${subtotal}</div>
    </div>`;
  }).join('');
}

function updateCartUI() {
  const items = Object.values(cart).filter(i => i.qty > 0);
  const totalQty = items.reduce((s, i) => s + i.qty, 0);
  const totalPrice = items.reduce((s, i) => s + i.qty * i.price, 0);

  // Update floating button
  const btn = document.getElementById('cart-btn');
  document.getElementById('cart-count').textContent = totalQty;
  btn.classList.toggle('hidden', totalQty === 0);

  // Update total
  document.getElementById('cart-total').textContent =
    totalPrice >= 1000 ? (totalPrice/1000).toFixed(0) + 'k' : totalPrice + 'đ';

  // Disable "Gọi món" when cart is empty
  document.getElementById('cart-call-btn').disabled = totalQty === 0;

  renderCartBody();
}

function changeQty(key, delta) {
  if (!cart[key]) return;
  cart[key].qty += delta;
  if (cart[key].qty <= 0) {
    delete cart[key];
    // Force full re-render since item removed
    document.getElementById('cart-body').dataset.keys = '';
  }
  updateCartUI();
}

function updateNote(key, value) {
  if (cart[key]) cart[key].note = value;
}

function clearCart() {
  Object.keys(cart).forEach(k => delete cart[k]);
  document.getElementById('cart-body').dataset.keys = '';
  updateCartUI();
  closeCart();
}

function openCart() {
  document.getElementById('cart-overlay').classList.add('open');
  document.getElementById('cart-panel').classList.add('open');
}

function closeCart() {
  document.getElementById('cart-overlay').classList.remove('open');
  document.getElementById('cart-panel').classList.remove('open');
}

// ── ORDER TYPE FLOW ──────────────────────────────────────
let currentOrderType = null;

function openOrderTypeModal() {
  const items = Object.values(cart).filter(i => i.qty > 0);
  if (items.length === 0) return;
  document.getElementById('order-type-overlay').classList.add('open');
  document.getElementById('order-type-panel').classList.add('open');
}

function closeOrderTypeModal() {
  document.getElementById('order-type-overlay').classList.remove('open');
  document.getElementById('order-type-panel').classList.remove('open');
}

function selectOrderType(type) {
  currentOrderType = type;
  closeOrderTypeModal();
  openBillView();
}

function openBillView() {
  const items = Object.values(cart).filter(i => i.qty > 0);
  if (items.length === 0) return;

  document.getElementById('bill-items').innerHTML = items.map(item =>
    `<div class="bill-item-row">
      <span class="bill-item-qty">${item.qty}x</span>
      <span class="bill-item-name">${item.name}</span>
    </div>${item.note ? `<div class="bill-item-note">↳ ${item.note}</div>` : ''}`
  ).join('');

  const tableRow = document.getElementById('bill-table-row');
  const shipFields = document.getElementById('bill-ship-fields');
  const totalBlock = document.getElementById('bill-total-block');

  // Tổng cộng luôn hiện cho cả 2 trường hợp
  const totalPrice = items.reduce((s, i) => s + i.qty * i.price, 0);
  document.getElementById('bill-total-amount').textContent = (totalPrice/1000).toFixed(0) + 'k';
  totalBlock.style.display = 'block';

  if (currentOrderType === 'ship') {
    tableRow.style.display = 'none';
    shipFields.style.display = 'flex';
  } else {
    tableRow.style.display = 'flex';
    shipFields.style.display = 'none';
  }

  closeCart();
  document.getElementById('bill-view').classList.add('open');
}

function closeBillView() {
  document.getElementById('bill-view').classList.remove('open');
  document.getElementById('bill-table').value = '';
  document.getElementById('bill-ship-name').value = '';
  document.getElementById('bill-ship-phone').value = '';
  document.getElementById('bill-ship-address').value = '';
  currentOrderType = null;
}

// ── DYNAMIC MENU + FOOTER FROM GOOGLE SHEET (KHÔNG CÓ DỰ PHÒNG TĨNH) ──
const MENU_TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS74gW_qpFuYMyCvPZkELrZpPB-mkrXf13ekJzF5_wspmmaH3pNeELlteTwdktU0dqxJa71n0kH5Axn/pub?gid=69361384&single=true&output=tsv';
const FOOTER_TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS74gW_qpFuYMyCvPZkELrZpPB-mkrXf13ekJzF5_wspmmaH3pNeELlteTwdktU0dqxJa71n0kH5Axn/pub?gid=1062432245&single=true&output=tsv';
const MAX_RETRIES = 3;
const RETRY_DELAY_MS = 1200;

const KNOWN_TAB_STYLE = {
  'Cà Phê':          { icon: '☕', bannerClass: 'banner-ca-phe' },
  'Trà':             { icon: '🍵', bannerClass: 'banner-tra' },
  'Trà Sữa':         { icon: '🧋', bannerClass: 'banner-tra-sua' },
  'Sữa Péo':         { icon: '🥤', bannerClass: 'banner-sua-peo' },
  'Sữa Chua':        { icon: '🍦', bannerClass: 'banner-sua-chua' },
  'Nước Ngọt':       { icon: '🍋', bannerClass: 'banner-nuoc' },
  'Topping & Thêm':  { icon: '✨', bannerClass: 'banner-topping' },
};
const FALLBACK_TAB_STYLES = [
  { icon: '🍹', bannerClass: 'banner-ca-phe' },
  { icon: '🍓', bannerClass: 'banner-tra' },
  { icon: '🍯', bannerClass: 'banner-tra-sua' },
  { icon: '🍪', bannerClass: 'banner-sua-peo' },
];

function tabSlug(tabName) {
  return tabName
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/đ/gi, 'd')
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '');
}

function escapeHtmlQ(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function parsePriceVNQ(str) {
  if (!str || !str.trim()) return null;
  const digits = str.trim().replace(/\./g, '').replace(/,/g, '');
  const n = parseInt(digits, 10);
  return isNaN(n) ? null : n;
}

function priceToKStrQ(n) {
  if (n < 1000) return n + 'đ';
  const k = n / 1000;
  return (k % 1 === 0 ? k.toFixed(0) : k.toFixed(1)) + 'k';
}

function parseTSVQ(text) {
  const lines = text.split('\n').filter(l => l.trim());
  const headers = lines[0].split('\t').map(h => h.trim());
  return lines.slice(1).map(line => {
    const cells = line.split('\t');
    const row = {};
    headers.forEach((h, i) => row[h] = cells[i] !== undefined ? cells[i] : '');
    return row;
  });
}

function buildItemHtmlQ(row) {
  const name = (row['Tên món'] || '').trim();
  const desc = (row['Mô tả'] || '').trim();
  const topping = (row['Topping gợi ý'] || '').trim();
  const price = parsePriceVNQ(row['Giá']);
  const soldOut = (row['Hết hàng (x = hết)'] || '').trim().toLowerCase() === 'x';

  const safeName = escapeHtmlQ(name);
  const soldOutClass = soldOut ? ' sold-out' : '';
  const soldOutBadge = soldOut ? '<span class="item-badge">Hết hàng</span>' : '';
  const p = price !== null ? price : 0;
  const priceStr = priceToKStrQ(p);

  const descHtml = desc ? `<span class="item-desc">${escapeHtmlQ(desc)}</span>` : '';
  const toppingHtml = topping ? `<span class="item-topping">+ Thêm: <span>${escapeHtmlQ(topping)}</span></span>` : '';

  return `<div class="item${soldOutClass}"><div class="item-name-wrap"><div class="item-name-row"><span class="item-name">${safeName}</span>${soldOutBadge}</div>${descHtml}${toppingHtml}</div><span class="item-price">${priceStr}</span><button class="item-add" onclick="addToCart('${safeName}','${priceStr}',this)">+</button></div>`;
}

function buildSectionHtmlQ(sectionId, tabName, tabRows, isFirst, styleIndex) {
  const known = KNOWN_TAB_STYLE[tabName];
  const style = known || FALLBACK_TAB_STYLES[styleIndex % FALLBACK_TAB_STYLES.length];
  const itemsHtml = tabRows.map(buildItemHtmlQ).join('');
  return `<section class="menu-section${isFirst ? ' active' : ''}" id="${sectionId}">
    <div class="section-banner ${style.bannerClass}"><span>${style.icon}</span></div>
    <div class="section-header"><div class="section-title">${escapeHtmlQ(tabName)}</div></div>
    <div class="item-list">${itemsHtml}</div>
  </section>`;
}

function showMenuLoadingState() {
  const status = document.getElementById('menu-status');
  status.classList.remove('hidden');
  status.innerHTML = `<div class="menu-status-spinner"></div><div class="menu-status-text">Đang tải menu...</div>`;
}

function showMenuErrorState(retryFn) {
  const status = document.getElementById('menu-status');
  status.classList.remove('hidden');
  status.innerHTML = `<div class="menu-status-text">Không tải được menu, vui lòng thử lại.</div><button class="menu-status-retry-btn" id="menu-retry-btn">Thử lại</button>`;
  document.getElementById('menu-retry-btn').onclick = retryFn;
}

function hideMenuStatus() {
  document.getElementById('menu-status').classList.add('hidden');
}

function sleepQ(ms) { return new Promise(r => setTimeout(r, ms)); }

async function fetchTSVOnce(url, requiredCol) {
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error('Fetch failed: ' + res.status);
  const text = await res.text();
  const rows = parseTSVQ(text).filter(r => r[requiredCol] && r[requiredCol].trim());
  if (rows.length === 0) throw new Error('No rows parsed for ' + url);
  return rows;
}

async function fetchWithRetry(url, requiredCol) {
  let lastErr = null;
  for (let attempt = 1; attempt <= MAX_RETRIES; attempt++) {
    try {
      return await fetchTSVOnce(url, requiredCol);
    } catch (err) {
      lastErr = err;
      console.warn(`Lần thử ${attempt}/${MAX_RETRIES} thất bại (${url}):`, err);
      if (attempt < MAX_RETRIES) await sleepQ(RETRY_DELAY_MS);
    }
  }
  throw lastErr;
}

async function loadMenuFromSheet() {
  const searchInput = document.getElementById('search-input');
  searchInput.disabled = true;
  searchInput.placeholder = 'Đang tải menu...';
  showMenuLoadingState();

  let menuRows, footerRows;
  try {
    [menuRows, footerRows] = await Promise.all([
      fetchWithRetry(MENU_TSV_URL, 'Tên món'),
      fetchWithRetry(FOOTER_TSV_URL, 'Trường'),
    ]);
  } catch (err) {
    console.error('Không tải được dữ liệu sau', MAX_RETRIES, 'lần thử:', err);
    showMenuErrorState(loadMenuFromSheet);
    return;
  }

  // ── Render Menu ──
  const tabOrder = [];
  const byTab = {};
  menuRows.forEach(row => {
    const tab = (row['Tab'] || '').trim();
    if (!tab) return;
    if (!byTab[tab]) { byTab[tab] = []; tabOrder.push(tab); }
    byTab[tab].push(row);
  });

  if (tabOrder.length === 0) {
    showMenuErrorState(loadMenuFromSheet);
    return;
  }

  const navTabsHtml = tabOrder.map((tabName, i) => {
    const sectionId = tabSlug(tabName);
    return `<button class="nav-tab${i === 0 ? ' active' : ''}" onclick="showSection('${sectionId}')">${escapeHtmlQ(tabName)}</button>`;
  }).join('');

  const sectionsHtml = tabOrder.map((tabName, i) => {
    const sectionId = tabSlug(tabName);
    return buildSectionHtmlQ(sectionId, tabName, byTab[tabName], i === 0, i);
  }).join('');

  document.getElementById('nav-tabs').innerHTML = navTabsHtml;
  document.querySelectorAll('.menu-section').forEach(el => el.remove());
  document.getElementById('search-results').insertAdjacentHTML('afterend', sectionsHtml);
  document.querySelectorAll('.menu-section .item').forEach(el => {
    el.dataset.orig = el.innerHTML;
  });

  // ── Render Footer ──
  const footerMap = {};
  footerRows.forEach(row => {
    const field = (row['Trường'] || '').trim();
    const value = (row['Giá trị'] || '').trim();
    if (field) footerMap[field] = value;
  });

  const mapLink = footerMap['Link Google Maps'] || '#';
  const footerLinksHtml = `
    <div class="footer-item">
      <span class="footer-label">📍 Địa chỉ</span>
      <span class="footer-value">${escapeHtmlQ(footerMap['Địa chỉ'] || '')}</span>
      <a class="footer-map-btn" href="${mapLink}" target="_blank" rel="noopener">📍 Chỉ đường</a>
    </div>
    <div class="footer-item">
      <span class="footer-label">🕐 Giờ mở cửa</span>
      <span class="footer-value">${escapeHtmlQ(footerMap['Giờ mở cửa'] || '')}</span>
    </div>
    <div class="footer-item">
      <span class="footer-label">WiFi</span>
      <span class="footer-value">${escapeHtmlQ(footerMap['WiFi'] || '')}</span>
    </div>
    <div class="footer-item">
      <span class="footer-label">TikTok</span>
      <span class="footer-value">${escapeHtmlQ(footerMap['TikTok'] || '')}</span>
    </div>
    <div class="footer-item">
      <span class="footer-label">Fanpage</span>
      <span class="footer-value">${escapeHtmlQ(footerMap['Fanpage'] || '')}</span>
    </div>`;
  document.getElementById('footer-links').innerHTML = footerLinksHtml;

  // Cập nhật nút gọi điện theo SĐT từ Sheet
  const phone = (footerMap['Số điện thoại'] || '').replace(/[^0-9+]/g, '');
  const callBtn = document.getElementById('call-btn');
  if (phone) callBtn.setAttribute('href', 'tel:' + phone);

  hideMenuStatus();
  searchInput.disabled = false;
  searchInput.placeholder = 'Tìm món... vd: matcha, trà đào, kem trứng';

  console.log('Menu + Footer loaded from Google Sheet:', tabOrder);
}

document.addEventListener('DOMContentLoaded', loadMenuFromSheet);

</script>
